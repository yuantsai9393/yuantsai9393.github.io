<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2b2160">
<title>🪄 魔法故事書</title>
<style>
:root {
  --night-top: #2b2160;      /* 夜空紫（上） */
  --night-bottom: #5a3d8a;   /* 夜空紫（下） */
  --star: #ffd66b;           /* 星光金 */
  --star-warm: #ff9d6b;      /* 生成按鈕漸層尾色 */
  --ink: #3a2f5b;            /* 故事卡片文字 */
  --paper: rgba(255,255,255,.95);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  font-family: "Yuanti TC", "PingFang TC", -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
}
body {
  background: linear-gradient(180deg, var(--night-top), var(--night-bottom));
  background-attachment: fixed;
  color: #fff;
  -webkit-text-size-adjust: 100%;
}

.app {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px calc(48px + env(safe-area-inset-bottom));
}

/* 標題列：左邊標題、右邊睡前模式全域開關。
   睡前模式是「進來前就決定好的意圖」（今晚要哄睡還是同樂），屬前置決策，
   所以放在右上角最顯眼處，而不是藏在選完卡之後的按鈕群裡。 */
.app-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}
h1 { font-size: 26px; font-weight: 700; margin: 8px 0 4px; }
.subtitle { opacity: .75; font-size: 14px; margin: 0; }

/* ---------- 卡片組 ---------- */
.group { margin-bottom: 16px; }
.group-label { font-size: 13px; opacity: .7; margin-bottom: 6px; }
.group-hint { opacity: .8; }

/* 3 欄 2 排：每張卡變寬，名字不會擠，觸控目標也更好按 */
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.card {
  /* 觸控目標 ≥ 44px */
  min-height: 72px;
  padding: 12px 4px;
  border-radius: 16px;
  border: 3px solid transparent;
  background: rgba(255,255,255,.1);
  color: #fff;
  font-family: inherit;
  cursor: pointer;
  transition: transform .15s, background .15s, border-color .15s;
}
.card:hover { background: rgba(255,255,255,.16); }
.card[aria-pressed="true"] {
  border-color: var(--star);
  background: rgba(255,214,107,.25);
  transform: scale(1.06);
}
.card:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
/* emoji 與名稱要上下堆疊（不可用行內元素，否則名稱會被擠到旁邊折行） */
.card-emoji { display: block; font-size: 30px; line-height: 1.1; }
.card-name { display: block; font-size: 12px; margin-top: 2px; white-space: nowrap; }

/* ---------- 睡前模式（右上角全域開關）----------
   操作者是家長，需要一眼確認「現在是哪個狀態」。
   單靠圖示會產生「這圖是現狀、還是點了會變成的樣子」的混淆，
   所以用三層同時變化來鎖定語意：
     ① 圖示   清醒滿月 🌝 ↔ 睡著月亮 😴
     ② 滑桿   左 ↔ 右（開關的心智模型）
     ③ 底色   明亮紫 ↔ 深夜暗紫
   文字用「說故事／睡覺囉」而非「開／關」，家長不必推理哪個是開。 */
.bedtime {
  flex-shrink: 0;
  width: 76px;
  min-height: 44px;
  margin-top: 4px;
  padding: 8px 8px 6px;
  border-radius: 16px;
  font-family: inherit;
  line-height: 1.2;
  text-align: center;
  color: #fff;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,.2);
  background: linear-gradient(180deg, #7a6bc4, #8f7fd6);
  transition: background .3s, border-color .3s;
}
.bedtime[aria-pressed="true"] {
  border-color: var(--star);
  background: linear-gradient(180deg, #1a1240, #2b2160);
}
.bedtime:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

.bedtime-icon { display: block; font-size: 25px; }

.bedtime-track {
  display: block;
  position: relative;
  width: 38px;
  height: 16px;
  margin: 4px auto 3px;
  border-radius: 10px;
  background: rgba(255,255,255,.3);
  transition: background .3s;
}
.bedtime[aria-pressed="true"] .bedtime-track { background: var(--star); }

.bedtime-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  transition: left .3s;
}
.bedtime[aria-pressed="true"] .bedtime-thumb { left: 24px; }

.bedtime-label { display: block; font-size: 11px; opacity: .9; }

/* ---------- 隨機驚喜 ---------- */
.surprise {
  width: 100%;
  min-height: 48px;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 16px;
  margin-top: 4px;
  cursor: pointer;
  border: 2px dashed rgba(255,255,255,.4);
  background: rgba(255,255,255,.08);
  color: #fff;
  transition: background .15s;
}
.surprise:hover { background: rgba(255,255,255,.14); }
.surprise:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

/* ---------- 生成按鈕 ---------- */
.generate {
  width: 100%;
  min-height: 56px;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  border-radius: 20px;
  border: none;
  margin-top: 8px;
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.4);
  cursor: default;
  transition: background .2s, color .2s;
}
.generate.ready {
  background: linear-gradient(90deg, var(--star), var(--star-warm));
  color: #4a2c00;
  cursor: pointer;
}
.generate:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

/* ---------- 故事卡片 ---------- */
.story-card {
  margin-top: 20px;
  background: var(--paper);
  color: var(--ink);
  border-radius: 20px;
  padding: 20px;
}
.story-text {
  font-size: 17px;
  line-height: 1.9;
  white-space: pre-wrap;
  margin: 0;
}
.story-meta {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #e6e0f2;
  font-size: 13px;
  color: #6b5f8c;
}
.again {
  margin-top: 10px;
  width: 100%;
  min-height: 44px;
  padding: 12px;
  font-size: 16px;
  font-family: inherit;
  border-radius: 14px;
  border: 2px solid var(--night-bottom);
  background: #fff;
  color: var(--night-bottom);
  cursor: pointer;
}
.again:focus-visible { outline: 3px solid var(--night-bottom); outline-offset: 2px; }

/* ---------- 朗讀 ---------- */
.voice-picker {
  margin-top: 14px;
  width: 100%;
  min-height: 44px;
  padding: 10px;
  font-size: 14px;
  font-family: inherit;
  border-radius: 12px;
  border: 1.5px solid #cfc6e6;
  background: #f6f3fc;
  color: var(--ink);
}
.speak {
  margin-top: 10px;
  width: 100%;
  min-height: 48px;
  padding: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  border-radius: 14px;
  border: none;
  background: var(--night-bottom);
  color: #fff;
  cursor: pointer;
}
.speak.on { background: #b0446b; }
.speak:focus-visible { outline: 3px solid var(--night-bottom); outline-offset: 2px; }

/* ---------- 家長設定：語音 A/B（暫時功能）---------- */
.voice-settings {
  margin: 0 0 18px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.06);
  overflow: hidden;
}
.voice-settings summary {
  list-style: none;
  cursor: pointer;
  min-height: 44px;
  display: flex;
  align-items: center;
  padding: 10px 14px;
  font-size: 14px;
  color: rgba(255,255,255,.85);
}
.voice-settings summary::-webkit-details-marker { display: none; }
.voice-settings-body { padding: 0 14px 14px; }
.voice-settings-hint { font-size: 13px; opacity: .7; margin: 0 0 10px; line-height: 1.6; }
.azure-voice-list { display: flex; flex-direction: column; gap: 8px; }
.azure-voice {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 44px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 2px solid transparent;
  background: rgba(255,255,255,.1);
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
}
.azure-voice[aria-pressed="true"] {
  border-color: var(--star);
  background: rgba(255,214,107,.22);
}
.azure-voice:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
.azure-voice-name { font-weight: 600; }
.azure-voice-note { opacity: .65; font-size: 12px; }
.azure-voice-check { margin-left: auto; color: var(--star); }

/* ---------- 收藏 ---------- */
/* 靠左的小膠囊：把右上角完整讓給睡前模式開關，兩者不搶位置 */
.fav-entry {
  display: inline-block;
  margin: 0 0 18px;
  min-height: 44px;
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  border-radius: 22px;
  border: 1.5px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.08);
  color: #fff;
  cursor: pointer;
}
.fav-entry:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

.fav {
  margin-top: 10px;
  width: 100%;
  min-height: 44px;
  padding: 12px;
  font-size: 16px;
  font-family: inherit;
  border-radius: 14px;
  border: 2px solid #e6c9d6;
  background: #fff;
  color: #b0446b;
  cursor: pointer;
}
.fav.saved { background: #fdeef4; border-color: #b0446b; }
.fav:focus-visible { outline: 3px solid #b0446b; outline-offset: 2px; }

/* 收藏清單頁：整頁覆蓋，睡前單手操作比較好按 */
.fav-panel {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: linear-gradient(180deg, var(--night-top), var(--night-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px calc(40px + env(safe-area-inset-bottom));
}
.fav-panel-inner { max-width: 480px; margin: 0 auto; }
.fav-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
}
.fav-head h2 { font-size: 20px; font-weight: 700; }
.fav-close {
  min-width: 44px; min-height: 44px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1);
  color: #fff;
  font-size: 20px;
  font-family: inherit;
  cursor: pointer;
}
.fav-close:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

.fav-item {
  display: flex;
  align-items: stretch;
  gap: 8px;
  margin-bottom: 10px;
}
.fav-open {
  flex: 1;
  min-width: 0;
  text-align: left;
  padding: 14px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,.95);
  color: var(--ink);
  font-family: inherit;
  cursor: pointer;
}
.fav-open:focus-visible { outline: 3px solid var(--star); outline-offset: 2px; }
/* 卡片標籤長的時候（雙主角＋睡前）不能把日期擠到下一行，
   標籤這側截斷，日期固定不換行 */
.fav-item-meta {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-size: 13px;
  color: #6b5f8c;
  margin-bottom: 4px;
}
.fav-item-cards {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.fav-item-date { flex-shrink: 0; white-space: nowrap; }
.fav-item-preview {
  font-size: 15px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.fav-del {
  flex-shrink: 0;
  width: 48px;
  border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.08);
  color: #fff;
  font-size: 18px;
  font-family: inherit;
  cursor: pointer;
}
.fav-del:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

.fav-empty {
  text-align: center;
  opacity: .8;
  font-size: 15px;
  line-height: 1.8;
  padding: 40px 10px;
}

/* iOS 語音下載引導：平常收合，不干擾主要流程 */
.voice-help {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #e6e0f2;
  font-size: 13px;
  color: #6b5f8c;
}
.voice-help summary {
  cursor: pointer;
  min-height: 24px;
  padding: 4px 0;
  list-style: none;
}
.voice-help summary::-webkit-details-marker { display: none; }
.voice-help p { margin-top: 8px; line-height: 1.75; }
.voice-help code {
  background: #f0ebfa;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 12px;
}

/* ---------- 等待 / 錯誤 ---------- */
.status {
  margin-top: 20px;
  border-radius: 20px;
  padding: 24px 20px;
  text-align: center;
  background: rgba(255,255,255,.1);
}
.status-icon { font-size: 40px; display: block; margin-bottom: 10px; }
.status-text { font-size: 15px; line-height: 1.7; }

.status.error { background: rgba(255,255,255,.14); }
.status.error .status-text { opacity: .9; }
.retry {
  margin-top: 14px;
  min-height: 44px;
  padding: 10px 24px;
  font-size: 15px;
  font-family: inherit;
  border-radius: 14px;
  border: 2px solid var(--star);
  background: transparent;
  color: var(--star);
  cursor: pointer;
}
.retry:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

/* ---------- 魔法書翻開動畫 ----------
   純 CSS，不載入任何圖檔。重試最久可能等到 40 秒以上，
   所以動畫必須是無限循環、看久了也不煩躁的節奏。 */
.book {
  position: relative;
  width: 132px;
  height: 96px;
  margin: 0 auto 16px;
  perspective: 700px;
}
/* 書後方的暖光暈 */
.book::before {
  content: "";
  position: absolute;
  left: 50%; top: 55%;
  width: 170px; height: 120px;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse at center, rgba(255,214,107,.38), transparent 70%);
  animation: glow 2.6s ease-in-out infinite;
}
@keyframes glow {
  0%, 100% { opacity: .55; }
  50%      { opacity: 1; }
}

.book-page {
  position: absolute;
  bottom: 0;
  width: 64px; height: 88px;
  background: linear-gradient(180deg, #fffdf6, #f1e7d2);
  box-shadow: 0 6px 16px rgba(0,0,0,.28);
}
.book-page.left  { left: 1px;  border-radius: 9px 3px 3px 9px; transform: rotate(-2deg); }
.book-page.right { right: 1px; border-radius: 3px 9px 9px 3px; transform: rotate(2deg); }
/* 書頁上的字行 */
.book-page::after {
  content: "";
  position: absolute;
  inset: 13px 9px;
  background: repeating-linear-gradient(180deg,
    rgba(90,61,138,.24) 0 2px, transparent 2px 11px);
  border-radius: 2px;
}

/* 一直翻過去的那一頁 */
.book-flip {
  position: absolute;
  bottom: 0; left: 50%;
  width: 64px; height: 88px;
  background: linear-gradient(180deg, #fffdf6, #ece0c6);
  border-radius: 3px 9px 9px 3px;
  transform-origin: left center;
  box-shadow: -3px 4px 14px rgba(0,0,0,.22);
  animation: flip 2s cubic-bezier(.45,.05,.55,.95) infinite;
}
@keyframes flip {
  0%   { transform: rotateY(0deg);    opacity: 1; }
  70%  { transform: rotateY(-142deg); opacity: 1; }
  100% { transform: rotateY(-180deg); opacity: 0; }
}

/* 飄出來的星星 */
.book-spark {
  position: absolute;
  font-size: 14px;
  opacity: 0;
  animation: spark 2.4s ease-in-out infinite;
}
.book-spark.s1 { left: 4px;  top: -4px; }
.book-spark.s2 { right: 0;   top: -12px; font-size: 12px; animation-delay: .8s; }
.book-spark.s3 { left: 52%;  top: -18px; animation-delay: 1.6s; }
@keyframes spark {
  0%, 100% { opacity: 0; transform: translateY(6px) scale(.7); }
  40%      { opacity: 1; transform: translateY(-5px) scale(1); }
}

/* 尊重使用者的「減少動態」設定：
   動畫全關，但魔法書要停在「已翻開」的靜止姿態，不能停成一團看不懂的形狀 */
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
  .card[aria-pressed="true"] { transform: none; }
  .book-flip { transform: rotateY(-165deg); opacity: .35; }
  .book::before { opacity: .8; }
  .book-spark { opacity: .9; transform: none; }
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div>
      <h1>🪄 魔法故事書</h1>
      <p class="subtitle">選三張卡片，變出你的故事</p>
    </div>
    <button id="bedtime-btn" class="bedtime" type="button"
            aria-pressed="false" aria-label="睡前模式">
      <span id="bedtime-icon" class="bedtime-icon" aria-hidden="true">🌝</span>
      <span class="bedtime-track" aria-hidden="true"><span class="bedtime-thumb"></span></span>
      <span id="bedtime-label" class="bedtime-label">說故事</span>
    </button>
  </div>

  <button id="fav-entry" class="fav-entry" type="button">⭐ 我的收藏</button>

  <!-- 家長設定：語音 A/B 測試（暫時功能，收合不佔主畫面，孩子不需要看到） -->
  <details id="voice-settings" class="voice-settings hidden">
    <summary>🔧 換一個說故事的聲音</summary>
    <div class="voice-settings-body">
      <p class="voice-settings-hint">聽聽看哪個聲音最順耳，選好之後每個故事都會用這個聲音。</p>
      <div id="azure-voice-list" class="azure-voice-list"></div>
    </div>
  </details>

  <div id="groups"></div>

  <button id="surprise-btn" class="surprise" type="button">🎲 隨機驚喜（幫我全部選好）</button>

  <button id="generate-btn" class="generate" type="button" disabled>變出故事！</button>

  <!-- 生成中 / 錯誤 -->
  <div id="status" class="status hidden" role="status" aria-live="polite">
    <div id="book" class="book" aria-hidden="true">
      <span class="book-spark s1">✨</span>
      <span class="book-spark s2">⭐</span>
      <span class="book-spark s3">✨</span>
      <div class="book-page left"></div>
      <div class="book-page right"></div>
      <div class="book-flip"></div>
    </div>
    <span id="status-icon" class="status-icon hidden" aria-hidden="true">🌧</span>
    <span id="status-text" class="status-text"></span>
    <button id="retry-btn" class="retry hidden" type="button">再試一次</button>
  </div>

  <!-- 故事 -->
  <div id="story-card" class="story-card hidden">
    <p id="story-text" class="story-text"></p>
    <div id="story-meta" class="story-meta"></div>

    <select id="voice-picker" class="voice-picker hidden" aria-label="選擇朗讀的聲音"></select>
    <button id="speak-btn" class="speak" type="button">🔊 唸給我聽</button>
    <button id="fav-btn" class="fav" type="button">🤍 收藏這個故事</button>
    <button id="again-btn" class="again" type="button">🎲 再變一個</button>

    <details id="voice-help" class="voice-help">
      <summary>🎧 覺得聲音不夠好聽？</summary>
      <p>
        手機內建的中文聲音選擇很少，品質也普通。到
        <code>設定 → 輔助使用 → 朗讀內容 → 語音 → 中文</code>
        下載「進階版」的聲音（例如美佳），下載完回到這裡，就能在上面的選單選到比較自然的聲音了。
      </p>
    </details>
  </div>
</div>

<!-- 收藏清單頁 -->
<div id="fav-panel" class="fav-panel hidden" role="dialog" aria-modal="true" aria-labelledby="fav-title">
  <div class="fav-panel-inner">
    <div class="fav-head">
      <h2 id="fav-title">⭐ 我的收藏</h2>
      <button id="fav-close" class="fav-close" type="button" aria-label="關閉收藏">✕</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   設定
   ══════════════════════════════════════════════════════════ */

/* Workers proxy 位址。本機開發自動指向 wrangler dev，
   線上則用部署後的 workers.dev 網址（部署後把下面這行換掉）。
   注意：這裡只有「網址」，沒有任何金鑰 —— 金鑰只存在 Workers 端。 */
const PROD_API = "https://magic-storybook.yuantsai9393.workers.dev";
const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
const API_BASE = isLocal ? "http://localhost:8787" : PROD_API;

/* 卡片內容。必須與 Workers 端的白名單一致，改這裡也要改 workers/src/index.js */
/* 三組各 6 張，排成 3 欄 2 排：一眼看完不用滑動。
   心情卡刻意用孩子有切身體驗的具體感受（想睡覺、肚子餓），
   而不是「溫馨」「神秘」這種大人視角的抽象形容詞。
   emoji 是刻意的佔位設計，v2 換插畫時只需改這裡的圖示欄位，UI 邏輯不動。 */
const CARDS = {
  角色: [["🦕","小恐龍"], ["🚀","太空人"], ["🦆","鴨鴨"], ["🤖","機器人"], ["🐰","小兔子"], ["🐻","阿熊"]],
  場景: [["🌲","大森林"], ["🌊","海底"], ["🌙","月亮上"], ["🏰","城堡"], ["🚀","外太空"], ["🍭","糖果屋"]],
  心情: [["✨","冒險"], ["😄","好笑"], ["😜","調皮"], ["🎁","驚喜"], ["😴","想睡覺"], ["🍩","肚子餓"]],
};

/* 每組可選上限：角色可複選兩個（雙主角），場景與心情單選 */
const MAX_PICK = { 角色: 2, 場景: 1, 心情: 1 };

const GROUP_HINT = { 角色: "（可以選兩個一起玩）" };

/* ══════════════════════════════════════════════════════════
   狀態
   ══════════════════════════════════════════════════════════ */

let pick = { 角色: [], 場景: [], 心情: [] };
let bedtime = false;
let loading = false;

/* Azure 語音 A/B 測試（暫時功能）。清單向 Workers 的 /voices 取，
   前端不自己維護一份，避免和後端白名單不同步。
   VOICE_KEY 記住家長選的語音；定案後移除選擇器只需刪這段與 UI 元件。 */
const VOICE_KEY = "storybook_voice";
let azureVoices = [];
let azureVoice = "";
try { azureVoice = localStorage.getItem(VOICE_KEY) || ""; } catch (e) {}

const el = (id) => document.getElementById(id);

function isReady() {
  return Object.keys(CARDS).every((g) => pick[g].length > 0);
}

/* ══════════════════════════════════════════════════════════
   卡片選取
   ══════════════════════════════════════════════════════════ */

/* 選卡規則（原型已驗證）：
   - 再點一次可取消
   - 還有空位就加入
   - 已達上限則replace掉「最早選的」，孩子永遠點得下去、不會卡住，
     也不需要先學會「取消」這個概念 */
function choose(group, name) {
  const cur = pick[group];
  const max = MAX_PICK[group] || 1;
  let next;
  if (cur.includes(name)) next = cur.filter((n) => n !== name);
  else if (cur.length < max) next = [...cur, name];
  else next = [...cur.slice(1), name];
  pick = { ...pick, [group]: next };
  renderCards();
  renderGenerateBtn();
}

/* 🎲 一鍵全選。四成機率給雙主角——雙主角故事有對話互動、品質較好，
   但不能每次都給，否則單主角的組合就沒機會出現了 */
function surprise() {
  const pickOne = (group) => CARDS[group][Math.floor(Math.random() * CARDS[group].length)][1];
  const roleCount = Math.random() < 0.4 ? 2 : 1;
  const roles = CARDS.角色
    .map((c) => c[1])
    .sort(() => Math.random() - 0.5)
    .slice(0, roleCount);

  pick = { 角色: roles, 場景: [pickOne("場景")], 心情: [pickOne("心情")] };
  renderCards();
  renderGenerateBtn();
}

function renderGroups() {
  const html = Object.entries(CARDS).map(([group, items]) => `
    <div class="group">
      <div class="group-label" id="label-${group}">
        ${group}${GROUP_HINT[group] ? `<span class="group-hint">${GROUP_HINT[group]}</span>` : ""}
      </div>
      <div class="card-grid" role="group" aria-labelledby="label-${group}">
        ${items.map(([emoji, name]) => `
          <button class="card" type="button"
                  data-group="${group}" data-name="${name}"
                  aria-pressed="false" aria-label="${group}：${name}">
            <span class="card-emoji" aria-hidden="true">${emoji}</span>
            <span class="card-name">${name}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `).join("");
  el("groups").innerHTML = html;

  el("groups").querySelectorAll(".card").forEach((btn) => {
    btn.addEventListener("click", () => choose(btn.dataset.group, btn.dataset.name));
  });
}

function renderCards() {
  el("groups").querySelectorAll(".card").forEach((btn) => {
    const on = pick[btn.dataset.group].includes(btn.dataset.name);
    btn.setAttribute("aria-pressed", on ? "true" : "false");
  });
}

/* ══════════════════════════════════════════════════════════
   睡前模式
   ══════════════════════════════════════════════════════════ */

function renderBedtime() {
  /* 只切換 aria-pressed，圖示/滑桿/底色三層都靠 CSS 跟著變，
     不要在 JS 裡各改各的，才不會有某一層忘了同步 */
  el("bedtime-btn").setAttribute("aria-pressed", bedtime ? "true" : "false");
  el("bedtime-icon").textContent = bedtime ? "😴" : "🌝";
  el("bedtime-label").textContent = bedtime ? "睡覺囉" : "說故事";
}

/* ══════════════════════════════════════════════════════════
   生成
   ══════════════════════════════════════════════════════════ */

function renderGenerateBtn() {
  const btn = el("generate-btn");
  const ready = isReady() && !loading;
  btn.disabled = !ready;
  btn.classList.toggle("ready", ready);
  btn.textContent = loading ? "魔法書翻開中⋯ ✨" : "變出故事！";
}

/* 重試最久可能等超過 30 秒，一句話不動會讓人以為當掉了，
   所以等待期間輪播訊息，讓家長知道魔法還在運作 */
const LOADING_MESSAGES = [
  "魔法書正在翻開⋯",
  "星星正在排隊⋯",
  "故事快要變出來了⋯",
];
let messageTimer = null;

function stopMessages() {
  clearInterval(messageTimer);
  messageTimer = null;
}

function showLoading() {
  el("status").className = "status loading";
  el("book").classList.remove("hidden");
  el("status-icon").classList.add("hidden");
  el("retry-btn").classList.add("hidden");
  el("status-text").textContent = LOADING_MESSAGES[0];

  let i = 0;
  stopMessages();
  messageTimer = setInterval(() => {
    i = (i + 1) % LOADING_MESSAGES.length;
    el("status-text").textContent = LOADING_MESSAGES[i];
  }, 3500);
}

/* 重試時停掉輪播、換成明確的訊息：讓家長知道不是當掉，是正在重試 */
function showRetrying(attempt) {
  stopMessages();
  el("status-text").textContent = `魔法有點卡住，再試一次⋯（第 ${attempt} 次）`;
}

function showError(text) {
  stopMessages();
  el("status").className = "status error";
  el("book").classList.add("hidden");
  el("status-icon").classList.remove("hidden");
  el("status-text").textContent = text;
  el("retry-btn").classList.remove("hidden");
}

function hideStatus() {
  stopMessages();
  el("status").classList.add("hidden");
}

/* 目前畫面上這則故事。收藏頁載入舊故事時也是灌進這裡，
   所以朗讀、收藏按鈕都不必分「新故事 / 舊故事」兩套邏輯 */
let currentStory = null;   /* { id, text, characters, scene, mood, bedtime } */

function storyLabel(s) {
  return `${s.characters.join("、")}．${s.scene}．${s.mood}` + (s.bedtime ? "．🌙 睡前" : "");
}

function showStory(story) {
  currentStory = story;
  el("story-text").textContent = story.text;
  el("story-meta").textContent = storyLabel(story);
  el("story-card").classList.remove("hidden");
  renderFavBtn();
}

function hideStory() { el("story-card").classList.add("hidden"); }

/* 友善的錯誤訊息（給家長看，不要出現技術術語） */
function friendlyError(errorCode) {
  switch (errorCode) {
    case "network":            return "連不到魔法書，檢查一下網路再試試。";
    case "rate_limited":       return "故事變得太快囉，休息一分鐘再來變下一個。";
    case "invalid_card_value": return "卡片好像怪怪的，重新選一次看看。";
    case "origin_not_allowed": return "這個網址還沒被魔法書認得。";
    default:                   return "魔法書試了好幾次都打不開，等一下再試試看。";
  }
}

const MAX_ATTEMPTS = 4;
const RETRY_BASE_MS = 1500;   /* 間隔遞增：1.5s → 3s → 4.5s */

/* 這些錯誤重試也不會變好，直接告訴使用者，不要讓孩子白等：
   - invalid_card_value / origin_not_allowed：請求本身就不對，重送幾次都一樣
   - rate_limited：限流以「分鐘」為單位，重試總共才等 9 秒，等不完
   - server_misconfigured：Workers 沒設金鑰，要人去修 */
const NO_RETRY = [
  "invalid_card_value",
  "origin_not_allowed",
  "rate_limited",
  "server_misconfigured",
];

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

async function requestStory() {
  try {
    const res = await fetch(API_BASE + "/story", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        characters: pick.角色,
        scene: pick.場景[0],
        mood: pick.心情[0],
        bedtime: bedtime,
      }),
    });
    const data = await res.json().catch(() => null);
    if (res.ok && data && data.story) return { ok: true, story: data.story };
    return { ok: false, error: (data && data.error) || "unknown" };
  } catch (e) {
    /* 連不上 Workers（斷網、伺服器沒開） */
    return { ok: false, error: "network" };
  }
}

async function generate() {
  if (!isReady() || loading) return;
  loading = true;
  stopSpeaking();   /* 舊故事還在唸的話先停掉，不要跟新故事疊在一起 */
  hideStory();
  renderGenerateBtn();
  showLoading();

  let lastError = "unknown";
  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    if (attempt > 1) showRetrying(attempt);

    const result = await requestStory();
    if (result.ok) {
      hideStatus();
      showStory({
        id: null,                        /* 還沒收藏 */
        text: result.story,
        characters: pick.角色.slice(),
        scene: pick.場景[0],
        mood: pick.心情[0],
        bedtime: bedtime,
      });
      loading = false;
      renderGenerateBtn();
      return;
    }

    lastError = result.error;
    if (NO_RETRY.includes(lastError)) break;
    if (attempt < MAX_ATTEMPTS) await sleep(RETRY_BASE_MS * attempt);
  }

  showError(friendlyError(lastError));
  loading = false;
  renderGenerateBtn();
}

/* ══════════════════════════════════════════════════════════
   收藏（localStorage）

   沿用 jp-shop 的做法：讀寫都包 try/catch。
   無痕模式或儲存空間滿的時候 localStorage 會直接丟例外，
   不能讓它把整個 App 弄掛 —— 收藏失敗頂多這則沒存到，故事還是要能聽。
   ══════════════════════════════════════════════════════════ */

const FAVS_KEY = "storybook_favs";

let favs = [];
try { favs = JSON.parse(localStorage.getItem(FAVS_KEY) || "[]"); } catch (e) { favs = []; }
if (!Array.isArray(favs)) favs = [];

function saveFavs() {
  try { localStorage.setItem(FAVS_KEY, JSON.stringify(favs)); } catch (e) {}
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function isFav(story) {
  return !!(story && story.id && favs.some((f) => f.id === story.id));
}

function renderFavBtn() {
  const btn = el("fav-btn");
  const saved = isFav(currentStory);
  btn.textContent = saved ? "💛 已收藏" : "🤍 收藏這個故事";
  btn.classList.toggle("saved", saved);
}

function renderFavEntry() {
  el("fav-entry").textContent = favs.length
    ? `⭐ 我的收藏（${favs.length}）`
    : "⭐ 我的收藏";
}

function toggleFav() {
  if (!currentStory) return;

  if (isFav(currentStory)) {
    audioCacheDeleteStory(currentStory.id);   /* 取消收藏，該故事所有語音變體的音檔一起清 */
    favs = favs.filter((f) => f.id !== currentStory.id);
    currentStory.id = null;
  } else {
    const item = {
      id: String(Date.now()),
      text: currentStory.text,
      characters: currentStory.characters,
      scene: currentStory.scene,
      mood: currentStory.mood,
      bedtime: currentStory.bedtime,
      savedAt: new Date().toISOString(),
    };
    favs.unshift(item);          /* 最新的排最前面 */
    currentStory = item;

    /* 剛剛唸過的話，音檔一起存起來：之後重聽不用再呼叫 /tts。
       key 要綁語音與睡前模式，收藏才會存到「剛剛聽到的那個聲音」 */
    if (lastAudio && lastAudio.text === item.text && lastAudio.bedtime === item.bedtime) {
      audioCachePut(audioKey(item.id, lastAudio.voice, item.bedtime), lastAudio.blob);
    }
  }
  saveFavs();
  renderFavBtn();
  renderFavEntry();
  renderFavList();
}

function favDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

function renderFavList() {
  const box = el("fav-list");
  if (!favs.length) {
    box.innerHTML = `<p class="fav-empty">還沒有收藏的故事。<br>聽到喜歡的，按下 🤍 就會留在這裡。</p>`;
    return;
  }
  box.innerHTML = favs.map((f) => `
    <div class="fav-item">
      <button class="fav-open" type="button" data-id="${f.id}">
        <div class="fav-item-meta">
          <span class="fav-item-cards">${escapeHtml(storyLabel(f))}</span>
          <span class="fav-item-date">${favDate(f.savedAt)}</span>
        </div>
        <div class="fav-item-preview">${escapeHtml(f.text)}</div>
      </button>
      <button class="fav-del" type="button" data-del="${f.id}"
              aria-label="刪除這則收藏">🗑</button>
    </div>
  `).join("");
}

function openFavPanel() {
  renderFavList();
  el("fav-panel").classList.remove("hidden");
}

function closeFavPanel() {
  el("fav-panel").classList.add("hidden");
}

/* ══════════════════════════════════════════════════════════
   音檔快取（IndexedDB）

   localStorage 只能存字串，二進位音檔要用 IndexedDB。
   這是省錢設計：收藏的故事重聽時直接播快取，不再呼叫 /tts。
   整層都是「有最好、沒有也不能壞」——快取失敗頂多多花一次 TTS，
   絕不能讓故事唸不出來。
   ══════════════════════════════════════════════════════════ */

const AUDIO_DB = "storybook";
const AUDIO_STORE = "audio";

function openAudioDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(AUDIO_DB, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(AUDIO_STORE)) db.createObjectStore(AUDIO_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

/* 快取 key 必須綁「故事 + 語音 + 睡前模式」三者：
   - 語音：A/B 測試換語音後，同一則故事的音檔是不同聲音，不能共用
   - 睡前：同一則故事開/關睡前模式的語氣不同，音檔也不同
   否則換了設定卻播到舊音檔。 */
function audioKey(id, voice, bedtimeFlag) {
  return id + "__" + (voice || "default") + "__" + (bedtimeFlag ? "b" : "n");
}

async function audioCacheGet(key) {
  if (!key || !("indexedDB" in window)) return null;
  try {
    const db = await openAudioDb();
    return await new Promise((resolve) => {
      const req = db.transaction(AUDIO_STORE, "readonly").objectStore(AUDIO_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch (e) { return null; }
}

async function audioCachePut(key, blob) {
  if (!key || !("indexedDB" in window)) return;
  try {
    const db = await openAudioDb();
    db.transaction(AUDIO_STORE, "readwrite").objectStore(AUDIO_STORE).put(blob, key);
  } catch (e) {}
}

/* 刪一則收藏時，把它所有語音 × 睡前變體的音檔都清掉，不留孤兒 */
async function audioCacheDeleteStory(id) {
  if (!id || !("indexedDB" in window)) return;
  try {
    const db = await openAudioDb();
    const store = db.transaction(AUDIO_STORE, "readwrite").objectStore(AUDIO_STORE);
    const req = store.getAllKeys();
    req.onsuccess = () => {
      (req.result || []).forEach((k) => {
        if (typeof k === "string" && k.indexOf(id + "__") === 0) store.delete(k);
      });
    };
  } catch (e) {}
}

/* ══════════════════════════════════════════════════════════
   朗讀模組

   主要走 Azure 曉臻（Workers 的 /tts），失敗才退回 Web Speech。
   對 UI 層仍然只暴露 speak() / stopSpeaking() 兩個介面。
   ══════════════════════════════════════════════════════════ */

const SPEECH_OK =
  "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;

/* 停頓分級：模仿真人講故事的換氣節奏 */
const PAUSE_MS = { 1: 250, 2: 600, 3: 1000 };

/* 這些符號會被語音引擎「逐字念出來」（例如把括號念成「小括號」），
   送進去之前一定要清掉。
   注意：整段切句都不可以用 lookbehind regex，
   舊版 iOS Safari 不支援，會讓整頁直接掛掉。 */
const NOISE_CHARS = /[「」『』（）()《》〈〉【】\[\]"'“”‘’…⋯‧．—－\-~～*#·、。，！？!?；;：:]/g;

let voices = [];
let voiceName = "";
let speaking = false;
let stopRequested = false;

/* 把故事切成一段一段，每段附帶「講完之後要停多久」 */
function splitIntoSegments(text) {
  const marked = text
    .replace(/\n+/g, "|3|")              /* 段落：最長停頓 */
    .replace(/([。！？!?])/g, "$1|2|")    /* 句末：中停頓 */
    .replace(/([，、,；;：:])/g, "$1|1|"); /* 逗號：短停頓 */

  /* split 帶捕獲群組後，偶數索引是文字、奇數索引是停頓等級 */
  const chunks = marked.split(/\|(\d)\|/);
  const segments = [];
  for (let i = 0; i < chunks.length; i += 2) {
    const clean = chunks[i].replace(NOISE_CHARS, " ").replace(/\s+/g, " ").trim();
    const pause = PAUSE_MS[chunks[i + 1]] || 500;

    if (clean) {
      segments.push({ text: clean, pause: pause });
    } else if (segments.length) {
      /* 這一塊清乾淨後是空的，但它的停頓不能跟著消失。
         最常見的情況是段落結尾「。\n\n」會被切成 句末標記 + 空塊 + 段落標記，
         若直接丟掉空塊，段落的 1000ms 就會被降級成句末的 600ms，
         「段落」這一級的停頓等於從來沒生效過。取較長的那個併進前一段。 */
      const last = segments[segments.length - 1];
      last.pause = Math.max(last.pause, pause);
    }
  }
  return segments;
}

function setSpeakingState(on, label) {
  speaking = on;
  const btn = el("speak-btn");
  btn.textContent = label || (on ? "⏹ 停下來" : "🔊 唸給我聽");
  btn.classList.toggle("on", on);
}

/* ---------- Azure 曉臻 ----------
   iOS 規定 play() 必須在使用者手勢的「同一個事件迴圈」內呼叫，
   但我們得先 await fetch 拿到音檔才有東西可播，await 之後手勢授權就失效了，
   直接照抄範例在 iPhone 上會播不出來（而 iPhone 正是本產品的主場景）。

   解法：點按鈕的當下先用一段無聲音檔把 <audio> 元素「解鎖」。
   同一個元素一旦在手勢中播放過，之後換 src 再播就會被允許。 */
const SILENT_WAV =
  "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";

let audioEl = null;
let audioUrl = null;
let usingFallback = false;   /* Azure 失敗過，改用 Web Speech */

/* 必須在 click handler 裡「同步」呼叫，不可以放在 await 後面 */
function unlockAudio() {
  if (!audioEl) {
    audioEl = new Audio();
    audioEl.addEventListener("ended", () => setSpeakingState(false));
    audioEl.addEventListener("error", () => setSpeakingState(false));
  }
  try {
    audioEl.src = SILENT_WAV;
    const p = audioEl.play();
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
}

function playBlob(blob) {
  if (audioUrl) URL.revokeObjectURL(audioUrl);
  audioUrl = URL.createObjectURL(blob);
  audioEl.src = audioUrl;
  const p = audioEl.play();
  if (p && p.catch) {
    p.catch(() => {
      /* 萬一還是被瀏覽器擋下來，至少讓故事唸得出來 */
      usingFallback = true;
      renderVoicePicker();
      speakWithWebSpeech(el("story-text").textContent);
    });
  }
}

async function fetchTts(text, bedtime, voice) {
  const res = await fetch(API_BASE + "/tts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: text, bedtime: bedtime, voice: voice }),
  });
  if (!res.ok) throw new Error("tts_failed");
  return await res.blob();
}

/* 同一則故事重聽不要重抓（省 TTS 額度）。收藏過的另外進 IndexedDB。
   比對要連 voice 一起：換語音後同一則故事是不同聲音，不能沿用記憶體快取 */
let lastAudio = null;   /* { text, bedtime, voice, blob } */

async function speak(story) {
  if (!story || !story.text) return;
  stopSpeaking();
  stopRequested = false;
  setSpeakingState(true, "準備聲音中⋯");

  const voice = azureVoice;   /* 這次朗讀用的語音，固定住避免中途被改 */

  try {
    let blob = null;

    if (lastAudio && lastAudio.text === story.text &&
        lastAudio.bedtime === story.bedtime && lastAudio.voice === voice) {
      blob = lastAudio.blob;
    }
    const key = story.id ? audioKey(story.id, voice, story.bedtime) : null;
    if (!blob && key) blob = await audioCacheGet(key);
    if (!blob) {
      blob = await fetchTts(story.text, story.bedtime, voice);
      if (key) audioCachePut(key, blob);
    }
    lastAudio = { text: story.text, bedtime: story.bedtime, voice: voice, blob: blob };

    if (stopRequested) { setSpeakingState(false); return; }
    setSpeakingState(true);
    playBlob(blob);
  } catch (e) {
    if (stopRequested) { setSpeakingState(false); return; }
    /* Azure 掛掉不能讓孩子聽不到故事：退回 Web Speech，
       並把語音挑選 UI 顯示出來（那些選項只在這條路徑上有意義） */
    usingFallback = true;
    renderVoicePicker();
    setSpeakingState(true);
    speakWithWebSpeech(story.text);
  }
}

/* ---------- Web Speech（備援）---------- */
function speakWithWebSpeech(text) {
  if (!SPEECH_OK) { setSpeakingState(false); return; }

  const segments = splitIntoSegments(text);
  if (!segments.length) return;

  const voice = voices.find((v) => v.name === voiceName);
  stopRequested = false;
  setSpeakingState(true);

  let i = 0;
  const next = () => {
    if (stopRequested || i >= segments.length) {
      setSpeakingState(false);
      return;
    }
    const seg = segments[i];
    const u = new SpeechSynthesisUtterance(seg.text);
    u.lang = "zh-TW";
    /* 每句語速語調微幅浮動，降低整篇同一個調子的機械感 */
    u.rate = 0.82 + (i % 3) * 0.03;   /* 0.82 / 0.85 / 0.88 */
    u.pitch = 1.06 + (i % 4) * 0.04;  /* 1.06 / 1.10 / 1.14 / 1.18 */
    if (voice) u.voice = voice;
    u.onend = () => setTimeout(next, seg.pause);
    u.onerror = () => setSpeakingState(false);
    i++;
    speechSynthesis.speak(u);
  };
  next();
}

/* 兩條播放路徑都要停：Azure 的 <audio> 和 Web Speech 的佇列 */
function stopSpeaking() {
  stopRequested = true;
  if (audioEl) {
    try { audioEl.pause(); audioEl.currentTime = 0; } catch (e) {}
  }
  if (SPEECH_OK) speechSynthesis.cancel();
  setSpeakingState(false);
}

/* ---------- 語音清單 ----------
   iOS 的 getVoices() 第一次常常回空陣列，要等 voiceschanged 事件才有 */
function loadVoices() {
  if (!SPEECH_OK) return;
  const all = speechSynthesis.getVoices() || [];
  voices = all.filter((v) => v.lang && v.lang.toLowerCase().indexOf("zh") === 0);

  /* 預設挑品質較好的；使用者已選過就不要蓋掉 */
  if (voices.length && !voices.some((v) => v.name === voiceName)) {
    const best = voices.find((v) => /美佳|Meijia|Siri|Google/.test(v.name)) || voices[0];
    voiceName = best.name;
  }
  renderVoicePicker();
}

function renderVoicePicker() {
  const sel = el("voice-picker");
  const help = el("voice-help");

  /* 語音挑選與 iOS 下載引導只在「退回 Web Speech」時才有意義。
     Azure 正常時聲音是固定的曉臻，這些選項只會讓家長困惑，收起來。 */
  if (!usingFallback || voices.length < 2) {
    sel.classList.add("hidden");
    help.classList.toggle("hidden", !usingFallback);
    return;
  }
  help.classList.remove("hidden");
  sel.classList.remove("hidden");
  sel.innerHTML = voices
    .map((v) => `<option value="${v.name}">🎙 ${v.name}（${v.lang}）</option>`)
    .join("");
  sel.value = voiceName;
}

/* ══════════════════════════════════════════════════════════
   啟動
   ══════════════════════════════════════════════════════════ */

renderGroups();
renderCards();
renderBedtime();
renderGenerateBtn();
renderFavEntry();

/* ---------- 收藏 ---------- */
el("fav-btn").addEventListener("click", toggleFav);
el("fav-entry").addEventListener("click", openFavPanel);
el("fav-close").addEventListener("click", closeFavPanel);

el("fav-list").addEventListener("click", (e) => {
  const del = e.target.closest("[data-del]");
  if (del) {
    audioCacheDeleteStory(del.dataset.del);   /* 連同所有語音變體的音檔一起清掉，不留孤兒 */
    favs = favs.filter((f) => f.id !== del.dataset.del);
    saveFavs();
    renderFavList();
    renderFavEntry();
    renderFavBtn();   /* 刪掉的可能正是畫面上這則，愛心要跟著變回空心 */
    return;
  }
  const open = e.target.closest("[data-id]");
  if (open) {
    const fav = favs.find((f) => f.id === open.dataset.id);
    if (!fav) return;
    stopSpeaking();          /* 別讓上一則還在唸 */
    hideStatus();
    showStory(fav);
    closeFavPanel();
    el("story-card").scrollIntoView({ block: "start" });
  }
});

/* 收藏頁開著時按 Esc 關閉 */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !el("fav-panel").classList.contains("hidden")) closeFavPanel();
});

el("bedtime-btn").addEventListener("click", () => {
  bedtime = !bedtime;
  renderBedtime();
});
el("surprise-btn").addEventListener("click", surprise);
el("generate-btn").addEventListener("click", generate);
el("again-btn").addEventListener("click", generate);
el("retry-btn").addEventListener("click", generate);

/* 朗讀：iOS 規定必須由使用者手勢觸發，所以只能綁在按鈕上，不可自動播放。
   unlockAudio() 一定要在這裡「同步」執行——它是整個 iOS 播放能否成功的關鍵，
   放到 speak() 裡的 await 後面就失效了。 */
el("speak-btn").addEventListener("click", () => {
  if (speaking) { stopSpeaking(); return; }
  unlockAudio();
  speak(currentStory);
});

el("voice-picker").addEventListener("change", (e) => {
  voiceName = e.target.value;
  /* 換聲音時如果正在唸，用新聲音從頭開始（這條只在 Web Speech 備援時會用到） */
  if (speaking) speakWithWebSpeech(el("story-text").textContent);
});

/* 先把語音清單準備好，Azure 失敗退回 Web Speech 時才不用臨時等 */
if (SPEECH_OK) {
  loadVoices();
  speechSynthesis.addEventListener("voiceschanged", loadVoices);
}
renderVoicePicker();   /* 預設把語音挑選與 iOS 引導收起來 */

/* ---------- Azure 語音 A/B 選擇（家長端，暫時功能）----------
   清單向 Workers 取，是唯一真實來源；定案後刪掉 /voices 與這段即可 */
function renderAzureVoices() {
  const box = el("azure-voice-list");
  if (!azureVoices.length) return;
  box.innerHTML = azureVoices.map((v) => `
    <button class="azure-voice" type="button" data-voice="${v.id}"
            aria-pressed="${v.id === azureVoice ? "true" : "false"}">
      <span class="azure-voice-name">${v.label}</span>
      <span class="azure-voice-note">${v.note}</span>
      <span class="azure-voice-check">${v.id === azureVoice ? "✓" : ""}</span>
    </button>
  `).join("");
  el("voice-settings").classList.remove("hidden");
}

async function loadAzureVoices() {
  try {
    const res = await fetch(API_BASE + "/voices");
    if (!res.ok) return;
    const data = await res.json();
    azureVoices = data.voices || [];
    /* 沒選過、或存的值已不在清單裡（清單改版），退回後端提供的預設 */
    if (!azureVoices.some((v) => v.id === azureVoice)) {
      azureVoice = data.default || (azureVoices[0] && azureVoices[0].id) || "";
    }
    renderAzureVoices();
  } catch (e) { /* 拿不到清單就不顯示選擇器，朗讀仍用預設語音 */ }
}

el("azure-voice-list").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-voice]");
  if (!btn) return;
  azureVoice = btn.dataset.voice;
  try { localStorage.setItem(VOICE_KEY, azureVoice); } catch (err) {}
  renderAzureVoices();
  /* 換語音時如果正在唸，用新語音從頭開始（會重新抓，因為快取 key 綁語音） */
  if (speaking && !usingFallback && currentStory) speak(currentStory);
});

loadAzureVoices();

/* 真的離開頁面時才停，避免關掉頁面後聲音還在背景繼續唸。
   刻意不綁 visibilitychange：睡前情境下家長很可能把手機放下、螢幕自動鎖上，
   那時故事應該繼續唸完，而不是被切斷。 */
window.addEventListener("pagehide", stopSpeaking);
</script>
